<!-- Overlay -->
<div
  *ngIf="visible"
  class="fixed inset-0 flex justify-center items-end z-50"
  style="background-color: rgba(0, 0, 0, 0.3)"
  (click)="close()"
>
  <!-- Bottom sheet -->
  <div
    class="w-full rounded-t-2xl p-4 shadow-lg transition-all duration-300 transform translate-y-0 backdrop-blur-sm"
    style="background-color: rgba(255, 255, 255, 0.9)"
    (click)="$event.stopPropagation()"
  >
    <h2 class="text-xl font-semibold mb-4 text-gray-800">Inserisci quantità</h2>
    <div class="relative flex items-center max-w-[11rem] md:pl-4">
      <button
        type="button"
        id="decrement-button"
        data-input-counter-decrement="qt-input"
        class="bg-[#1949A9] hover:shadow-sm border border-gray-300 rounded-s-lg p-3 h-11 focus:ring-gray-100 focus:ring-2 focus:outline-none"
        (click)="remove()"
      >
        <svg
          class="w-3 h-3 text-white"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 18 2"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M1 1h16"
          />
        </svg>
      </button>
      <input
        type="number"
        id="qt-input"
        data-input-counter
        data-input-counter-min="1"
        data-input-counter-max="5"
        aria-describedby="helper-text-explanation"
        class="flex items-center justify-center bg-gray-50 border-x-0 border-gray-300 h-11 font-medium text-center text-gray-900 text-2xl focus:ring-blue-500 focus:border-blue-500 block w-full leading-none"
        placeholder=""
        [(ngModel)]="qt"
        (input)="correggiQuantita($event)"
        required
      />
      <button
        type="button"
        id="increment-button"
        data-input-counter-increment="qt-input"
        class="bg-[#FA0D19] border border-gray-300 rounded-e-lg p-3 h-11 focus:ring-gray-100 focus:ring-2 focus:outline-none"
        (click)="add()"
      >
        <svg
          class="w-3 h-3 text-white"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 18 18"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 1v16M1 9h16"
          />
        </svg>
      </button>
    </div>

    <div class="flex justify-end gap-3 p-1 pt-2">
      <button
        class="px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 transition"
        (click)="close()"
      >
        Annulla
      </button>
      <button
        class="px-4 py-2 rounded-lg bg-orange-500 text-white hover:bg-orange-600 transition"
        (click)="confermaQuantita()"
      >
        Conferma
      </button>
    </div>
  </div>
</div>
