<shopping-cart-outline-icon />

<div class="grid grid-cols-2 gap-2 mt-2 mx-4">
  @for (product of productList; track $index) {
    <app-order-list-item
      [id]="$index"
      [label]="'Prodotto aaaaaaaa' + $index"
      price="66"
      (clicked)="clickProduct($event)"
    ></app-order-list-item>
  }
</div>
