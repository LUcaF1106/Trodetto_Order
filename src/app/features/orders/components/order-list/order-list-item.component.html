<div
  class="flex flex-col items-center bg-white px-1 py-1 border-1 border-gray-500 rounded-lg select-none"
  (click)="click()"
>
  <div class="w-full">
    <img [src]="urlImg" class="w-full h-auto rounded-lg p-4" alt="" />
    <div class="flex justify-center">
      <span class="text-sm text-black font-sans font-bold px-2 pb-2">{{
        label
      }}</span>
    </div>
    <div class="flex items-center justify-between px-1">
      <div class="">
        <p class="text-gray-500 text-xs font-sans">{{ price.toFixed(2) }}€</p>
      </div>
      <div class=""><plus-circle-solid-icon size="24" /></div>
    </div>
  </div>
</div>
