<div
  class="flex flex-col items-center bg-white shadow-md rounded-lg select-none"
  (click)="click()"
>
  <!--border-1 border-gray-500-->
  <div class="w-full">
    <img [src]="urlImg" class="w-full h-auto rounded-lg p-4" alt="" />
    <div class="flex justify-center">
      <span
        class="text-lg text-black font-sans font-bold text-wrap break-all text-center px-2 pb-2"
        >{{ label }}</span
      >
    </div>
    <div class="flex items-center justify-between px-2 pb-2">
      <div class="">
        <p class="text-gray-500 text-base font-sans font-bold px-2">
          {{ price.toFixed(2) }}€
        </p>
      </div>
      <div class=""><plus-circle-solid-icon size="36" /></div>
    </div>
  </div>
</div>
