<div class="bg-[#F5F5F5] h-screen">
  <div class="fixed left-2 top-2">
    <div class="p-2 bg-trodetto text-white rounded-full font-bold">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 19.5 8.25 12l7.5-7.5"
        />
      </svg>
    </div>
  </div>

  <div class="pt-15">
    <span class="text-5xl font-bold p-4">Nome Prodotto</span>
    <p>PREZZO?</p>
    <p class="p-2 pl-6 text-xl">descrizione</p>

    <div class="flex flex-col gap-3 p-6 bg-gray-100 min-h-screen">
      <!-- CARD -->
      <span class="font-sans text-xl"
        >Personalizza li panino: escli gli ingredienti</span
      >
      <label
        class="relative flex items-center gap-4 cursor-pointer rounded-xl border-2 border-transparent bg-gray-200 px-4 py-3 shadow-sm transition-all has-[:checked]:border-trodetto has-[:checked]:bg-white has-[:checked]:shadow-md"
      >
        <input type="checkbox" class="peer hidden" [(ngModel)]="check" />
        <div class="flex flex-col">
          <span
            class="text-gray-600 text-2xl peer-checked:text-gray-900 font-semibold"
          >
            Opzione 1
          </span>
        </div>
      </label>

      <label
        class="relative flex items-center gap-4 cursor-pointer rounded-xl border-2 border-transparent bg-gray-200 px-4 py-3 shadow-sm transition-all has-[:checked]:border-trodetto has-[:checked]:bg-white has-[:checked]:shadow-md"
      >
        <input type="checkbox" class="peer hidden" />
        <!--<div class="h-10 w-10 rounded-lg bg-gray-400 peer-checked:bg-blue-100 flex items-center justify-center text-white text-xl">
          ⚙️
        </div>-->
        <div class="flex flex-col">
          <span
            class="text-gray-600 text-2xl peer-checked:text-gray-900 font-semibold"
            >Opzione 2</span
          >
        </div>
      </label>

      <label
        class="relative flex items-center gap-4 cursor-pointer rounded-xl border-2 border-transparent bg-gray-200 px-4 py-3 shadow-sm transition-all has-[:checked]:border-trodetto has-[:checked]:bg-white has-[:checked]:shadow-md"
      >
        <input type="checkbox" class="peer hidden" />
        <div class="flex flex-col">
          <span
            class="text-gray-600 text-2xl peer-checked:text-gray-900 font-semibold"
            >Opzione 3</span
          >
        </div>
      </label>
    </div>
  </div>

  <div
    class="fixed bottom-0 right-0 left-0 bg-white grid grid-cols-6 gap-4 p-3"
  >
    <div class="col-span-4">
      <div class="relative flex items-center max-w-[11rem] pl-4">
        <button
          type="button"
          id="decrement-button"
          data-input-counter-decrement="qt-input"
          class="bg-[#1949A9] hover:shadow-sm border border-gray-300 rounded-s-lg p-3 h-11 focus:ring-gray-100 focus:ring-2 focus:outline-none"
        >
          <svg
            class="w-3 h-3 text-white"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 18 2"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M1 1h16"
            />
          </svg>
        </button>
        <input
          type="text"
          id="qt-input"
          data-input-counter
          data-input-counter-min="1"
          data-input-counter-max="5"
          aria-describedby="helper-text-explanation"
          class="flex items-center justify-center bg-gray-50 border-x-0 border-gray-300 h-11 font-medium text-center text-gray-900 text-2xl focus:ring-blue-500 focus:border-blue-500 block w-full leading-none"
          placeholder=""
          value="3"
          required
        />
        <button
          type="button"
          id="increment-button"
          data-input-counter-increment="qt-input"
          class="bg-[#FA0D19] border border-gray-300 rounded-e-lg p-3 h-11 focus:ring-gray-100 focus:ring-2 focus:outline-none"
        >
          <svg
            class="w-3 h-3 text-white"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 18 18"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 1v16M1 9h16"
            />
          </svg>
        </button>
      </div>
    </div>
    <div class="col-span-2">
      <span
        class="flex items-center justify-end text-trodetto font-bold font-sans text-3xl pr-4"
        >{{ this.prezzo.toFixed(2) }}€</span
      >
    </div>
    <div class="col-span-6 p-1">
      <button
        class="w-full bg-trodetto text-white font-bold font-stretch-extra-expanded font-sans text-2xl p-2 rounded-xl"
        (click)="click()"
      >
        Aggiugi
      </button>
    </div>
  </div>
</div>
