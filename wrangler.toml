name = "trodetto-order"
compatibility_date = "2026-06-04"
compatibility_flags = ["nodejs_compat"]
main = "./dist/trodetto-order/server/server.mjs"

# ─── Assets statici (CSS, JS, immagini) ──────────────────────────────────────
[assets]
directory = "./dist/trodetto-order/browser"
binding = "ASSETS"

# ─── Build ───────────────────────────────────────────────────────────────────
[build]
command = "npm run build"

# ─── Environment Variables ───────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
# ─── Ambiente: Staging ───────────────────────────────────────────────────────
[env.staging]
name = "trodetto-order-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

# ─── Ambiente: Production ────────────────────────────────────────────────────
[env.production]
name = "trodetto-order-production"
[env.production.vars]
ENVIRONMENT = "production"
